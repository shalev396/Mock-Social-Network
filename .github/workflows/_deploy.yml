# Reusable workflow: Deploy backend (Serverless) + frontend (S3 + CloudFront) for a given stage.
#
# GitHub configuration (create before first run):
# - Repository variable: AWS_REGION (must match serverless provider region)
# - Repository secrets: AWS_ACCOUNT_ID, SERVERLESS_ACCESS_KEY (if using Serverless Dashboard org/app),
#   HOSTED_ZONE_ID, CERTIFICATE_ARN
# - Environment (e.g. prod) secrets: DOMAIN_NAME, MONGODB_URI, SECRET_KEY, ENCRYPTION_KEY
# - IAM OIDC: trust this repo on role arn:aws:iam::<AWS_ACCOUNT_ID>:role/my-github-actions-role
#
# CloudFormation stack name: mock-social-network-<stage> (service + stage from serverless.yml)
name: Deploy

on:
  workflow_call:
    inputs:
      stage:
        description: 'Deployment stage (e.g. prod)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend (${{ inputs.stage }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.stage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
      DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role
      - run: npm install
        working-directory: Backend
      - name: Deploy to ${{ inputs.stage }}
        run: npm run deploy
        working-directory: Backend

  deploy-frontend:
    name: Deploy Frontend (${{ inputs.stage }})
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment:
      name: ${{ inputs.stage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role
      - run: npm ci
        working-directory: Frontend
      - run: npm run build
        working-directory: Frontend
      - name: Get CloudFormation Outputs
        id: cf
        run: |
          STACK="mock-social-network-${{ inputs.stage }}"
          for i in 1 2 3; do
            CF_ID=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text 2>/dev/null || echo "")
            S3_BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='S3ClientBucketName'].OutputValue" --output text 2>/dev/null || echo "")
            if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ] && [ -n "$S3_BUCKET" ] && [ "$S3_BUCKET" != "None" ]; then
              break
            fi
            echo "Waiting for CloudFormation outputs... (attempt $i)"
            sleep 10
          done
          if [ -z "$CF_ID" ] || [ "$CF_ID" = "None" ]; then
            echo "Error: Could not get CloudFrontDistributionId from stack $STACK"
            exit 1
          fi
          if [ -z "$S3_BUCKET" ] || [ "$S3_BUCKET" = "None" ]; then
            echo "Error: Could not get S3ClientBucketName from stack $STACK"
            exit 1
          fi
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
      - name: Deploy to S3
        run: aws s3 sync ./Frontend/dist s3://${{ steps.cf.outputs.s3_bucket }}/ --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.cf.outputs.cf_id }} --paths "/*"
