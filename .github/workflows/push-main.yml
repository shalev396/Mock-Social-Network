# Push to main: build Frontend then Backend deps, then deploy to prod (Serverless + S3/CloudFront).
name: Push Main

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'
      - 'Backend/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and build Frontend
        run: |
          npm install
          npm run build
        working-directory: Frontend
      - name: Install Backend dependencies
        run: npm install
        working-directory: Backend

  deploy:
    name: Deploy
    needs: build
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      stage: prod
