# Full-stack AWS deployment (Lambda HTTP API + S3 client + CloudFront + Route 53).
#
# Prerequisites:
# 1. ACM certificate in us-east-1 (N. Virginia) for CloudFront — set CERTIFICATE_ARN.
# 2. Route 53 hosted zone for your domain — set HOSTED_ZONE_ID.
# 3. S3 bucket name must be globally unique and DNS-compliant (DOMAIN_NAME is used as the client bucket name).
#
# After deploy: sync the Vite build to the client bucket (see stack output S3ClientBucketName),
# then invalidate CloudFront (output CloudFrontDistributionId) in CI/CD.
#
# org/app match the Elytra setup (Serverless Dashboard). If you deploy with only AWS credentials
# and the CLI complains, remove the org and app lines below.

org: shalev396

app: mock-social-network

service: mock-social-network

frameworkVersion: ^4.0.0

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage}
  region: ${env:AWS_REGION}
  memorySize: 256
  timeout: 30
  logRetentionInDays: 30

  logs:
    restApi: false

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - https://${env:DOMAIN_NAME}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      allowCredentials: false
      maxAge: 86400

  environment:
    MONGODB_URI: ${env:MONGODB_URI}
    SECRET_KEY: ${env:SECRET_KEY}
    ENCRYPTION_KEY: ${env:ENCRYPTION_KEY}

build:
  esbuild: false

package:
  individually: true

plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-offline-watcher

custom:
  appDisplayName: Mock Social Network

  clientBucketName: ${env:DOMAIN_NAME}

  viewerCertificate:
    AcmCertificateArn: ${env:CERTIFICATE_ARN}
    SslSupportMethod: sni-only
    MinimumProtocolVersion: TLSv1.2_2021

  esbuild:
    bundle: true
    minify: false
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    sourcemap: true
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
    exclude:
      - "@aws-sdk/*"
      - aws-sdk

  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noPrependStageInUrl: true
    reloadHandler: false
    disableCookieValidation: true
    enforceSecureCookies: false
    printOutput: true
    noAuth: true

  serverless-offline-watcher:
    - path:
        - .esbuild/.build/**/*
      hook: offline:functionsUpdated

functions:
  api:
    handler: handler.handler
    events:
      - httpApi:
          path: /api/{proxy+}
          method: ANY

resources:
  Description: ${self:custom.appDisplayName} — Lambda API, S3 client, CloudFront, Route 53 (${self:provider.stage})
  Resources:
    ClientFilesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.clientBucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              Status: Enabled
              NoncurrentVersionExpirationInDays: 30
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, HEAD]
              AllowedOrigins: ['*']
              MaxAge: 3600

    ClientFilesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: ClientFilesBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource:
                - Fn::Join:
                    - ''
                    - - 'arn:aws:s3:::'
                      - Ref: ClientFilesBucket
                      - '/*'

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      DependsOn:
        - HttpApi
      Properties:
        DistributionConfig:
          Comment: ${self:custom.appDisplayName} (${self:provider.stage})
          Enabled: true
          Aliases:
            - ${env:DOMAIN_NAME}
          ViewerCertificate: ${self:custom.viewerCertificate}
          DefaultRootObject: index.html

          DefaultCacheBehavior:
            TargetOriginId: ClientFilesOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf

          CacheBehaviors:
            - PathPattern: '/api/*'
              TargetOriginId: ApiGatewayOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
              CachedMethods: [GET, HEAD, OPTIONS]
              Compress: true
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

          Origins:
            - Id: ClientFilesOrigin
              DomainName:
                Fn::Select:
                  - 1
                  - Fn::Split:
                      - '//'
                      - Fn::GetAtt:
                          - ClientFilesBucket
                          - WebsiteURL
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
                OriginSSLProtocols: [TLSv1.2]

            - Id: ApiGatewayOrigin
              DomainName:
                Fn::Sub:
                  - '${ApiId}.execute-api.${AWS::Region}.amazonaws.com'
                  - ApiId:
                      Ref: HttpApi
              CustomOriginConfig:
                HTTPPort: 443
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]

          PriceClass: PriceClass_All
          HttpVersion: http2
          IPV6Enabled: true

    Route53Record:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name: ${env:DOMAIN_NAME}
        Type: A
        AliasTarget:
          DNSName:
            Fn::GetAtt:
              - CloudFrontDistribution
              - DomainName
          HostedZoneId: Z2FDTNDATAQYW2
          EvaluateTargetHealth: false

  Outputs:
    S3ClientBucketName:
      Description: Upload the Vite build here (CI/CD)
      Value:
        Ref: ClientFilesBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-S3ClientBucketName

    CloudFrontDistributionId:
      Description: Use for cache invalidation after client deploy
      Value:
        Ref: CloudFrontDistribution
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDistributionId

    CloudFrontDomainName:
      Description: CloudFront domain (alias is DOMAIN_NAME)
      Value:
        Fn::GetAtt:
          - CloudFrontDistribution
          - DomainName
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDomainName

    PublicAppUrl:
      Description: HTTPS URL for the SPA and same-origin /api (matches CloudFront alias)
      Value: https://${env:DOMAIN_NAME}
      Export:
        Name: ${self:service}-${self:provider.stage}-PublicAppUrl
